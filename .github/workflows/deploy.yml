name: Deploy Azure infra

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write     # required for OIDC token
      contents: read      # required for checkout

    steps:
      - name: Pre Azure Login (OIDC)
        run: echo "Starting OIDC login…"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: true

      # Ensure required Az modules are available in the runner
      - name: Install Az modules
        uses: azure/powershell@v1
        with:
          inlineScript: |
            Set-PSRepository -Name PSGallery -InstallationPolicy Trusted

            Install-Module Az.Accounts            -Force -AllowClobber -Scope CurrentUser
            Install-Module Az.Resources           -Force -AllowClobber -Scope CurrentUser
            Install-Module Az.OperationalInsights -Force -AllowClobber -Scope CurrentUser
            Install-Module Az.Monitor             -Force -AllowClobber -Scope CurrentUser
            Install-Module Az.KeyVault            -Force -AllowClobber -Scope CurrentUser
            Install-Module Az.Storage             -Force -AllowClobber -Scope CurrentUser

            Write-Host "Az modules installed:"
            Get-Module Az.* -ListAvailable | Select-Object Name, Version
          azPSVersion: latest

      - name: Deploy environment
        uses: azure/powershell@v1
        with:
          inlineScript: |
            ./automation/deploy-environment.ps1 `
              -Env dev `
              -App core `
              -Region weu `
              -Location westeurope
          azPSVersion: latest

      - name: Post Azure Login (OIDC)
        if: always()
        run: echo "Deployment finished."
