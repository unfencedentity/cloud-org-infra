<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>IRONFLUFF</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #050505;
      color: white;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      padding: 20px;
      box-sizing: border-box;
    }

    .container {
      text-align: center;
    }

.logo {
  width: clamp(140px, 45vw, 220px);
  margin-bottom: 30px;
  display: block;
  margin-left: auto;
  margin-right: auto;
}

h1 {
  font-size: clamp(2.4rem, 12vw, 5rem);
  letter-spacing: clamp(4px, 2vw, 12px);
  margin-bottom: 20px;
  word-break: normal;
}
    

p {
  color: #888;
  font-size: clamp(0.9rem, 4vw, 1.1rem);
  letter-spacing: clamp(1px, 1vw, 3px);
  padding: 0 20px;
}

    .glow {
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 70%);
      filter: blur(80px);
      z-index: -1;
    }
  </style>
</head>

<body>

  <div class="glow"></div>

  <div class="container">
<img src="assets/logo.png" class="logo" alt="IronFluff Logo">

<h1>IRONFLUFF</h1>    <p>Strength meets softness.</p>
  </div>

</body>
</html>
