name: Deploy Azure infra - develop

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          auth-type: SERVICE_PRINCIPAL
          enable-AzPSSession: true

      - name: Verify Azure context
        shell: pwsh
        run: |
          Write-Host "Azure CLI account:"
          az account show --query "{name:name, id:id, tenantId:tenantId}" -o table

          Write-Host ""
          Write-Host "Az PowerShell context:"
          Get-AzContext | Format-List Account, Tenant, Subscription

          Write-Host ""
          Write-Host "Available subscriptions:"
          Get-AzSubscription | Select-Object Name, Id, TenantId | Format-Table

      - name: Deploy infrastructure
        shell: pwsh
        run: |
          $subId = $env:AZURE_SUBSCRIPTION_ID.Trim()

          Write-Host "Setting Az PowerShell context..."
          Set-AzContext -SubscriptionId $subId | Out-Null

          Write-Host "Current Az context:"
          Get-AzContext | Format-List Account, Tenant, Subscription

          ./automation/deploy-environment.ps1 `
            -Environment dev `
            -App core `
            -Region weu `
            -Location westeurope
