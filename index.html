<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>IRONFLUFF</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #050505;
      color: white;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      padding: 24px;
    }

    .glow {
      position: absolute;
      width: 640px;
      height: 640px;
      background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 70%);
      filter: blur(90px);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      transform: translateY(-2vh);
    }

    .logo {
      display: block;
      width: clamp(340px, 32vw, 520px);
      margin: 0 auto 18px;
      opacity: 0.96;
      filter: drop-shadow(0 0 32px rgba(255, 255, 255, 0.16));
    }

    h1 {
      font-size: clamp(2.8rem, 7vw, 5.4rem);
      letter-spacing: clamp(4px, 1vw, 12px);
      margin-bottom: 18px;
      line-height: 1;
      font-weight: 700;
    }

    p {
      color: #8b8b8b;
      font-size: clamp(0.95rem, 2vw, 1.15rem);
      letter-spacing: clamp(2px, 0.7vw, 5px);
      padding: 0 20px;
    }

    @media (max-width: 480px) {
      .container {
        transform: translateY(-3vh);
      }

      .logo {
        width: min(78vw, 300px);
        margin-bottom: 20px;
      }

      h1 {
        font-size: clamp(2.4rem, 12vw, 3.6rem);
        letter-spacing: clamp(3px, 1.4vw, 7px);
        margin-bottom: 16px;
      }

      p {
        font-size: 0.9rem;
        letter-spacing: 2.5px;
      }
    }
  </style>
</head>

<body>
  <div class="glow"></div>

  <main class="container">
    <img src="assets/logo.png" class="logo" alt="IronFluff Logo" />
    <h1>IRONFLUFF</h1>
    <p>Strength meets softness.</p>
  </main>
</body>
</html>
